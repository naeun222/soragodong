<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1826;
    --surface2: #221f33;
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --text: #ede8f5;
    --text-dim: #9d9aad;
    --text-soft: #7b7a8e;
    --border: rgba(255, 255, 255, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0f0e17; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 32px 20px 80px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(139, 126, 196, 0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(201, 169, 110, 0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }
  .back-link {
    display: inline-block;
    color: var(--text-dim); text-decoration: none;
    font-size: 13.5px; margin-bottom: 24px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }
  h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .subtitle {
    font-size: 13px; color: var(--text-soft);
    margin-bottom: 32px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: 14px; font-weight: 600; color: var(--accent);
    margin-bottom: 14px; letter-spacing: 0.02em;
  }
  .row {
    display: flex; gap: 12px; padding: 8px 0;
    font-size: 13.5px; line-height: 1.7;
    border-bottom: 1px dashed rgba(255,255,255,0.04);
  }
  .row:last-child { border-bottom: 0; }
  .row .label { min-width: 130px; color: var(--text-dim); flex-shrink: 0; }
  .row .value { color: var(--text); }
  .row .value a { color: var(--accent); text-decoration: none; }
  .row .value a:hover { text-decoration: underline; }
  .legal-links {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-top: 6px;
  }
  .legal-links a {
    display: inline-block;
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); text-decoration: none;
    font-size: 13.5px;
    transition: border-color 0.2s, background 0.2s;
  }
  .legal-links a:hover {
    border-color: var(--accent);
    background: rgba(212,167,106,0.06);
  }
  .footer-note {
    margin-top: 28px;
    font-size: 11.5px;
    color: var(--text-soft);
    line-height: 1.7;
    text-align: center;
  }
