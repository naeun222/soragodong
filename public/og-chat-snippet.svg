<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0e17"/>
      <stop offset="100%" stop-color="#1a1826"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a96e" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <text x="600" y="78" text-anchor="middle" font-size="38" font-weight="700" fill="#ede8f5" letter-spacing="-0.5">
    ChatGPT한테 사적인 얘기,
  </text>
  <text x="600" y="125" text-anchor="middle" font-size="38" font-weight="700" fill="#c9a96e" letter-spacing="-0.5">
    좀 망설여진다면
  </text>

  <line x1="350" y1="160" x2="850" y2="160" stroke="url(#accentLine)" stroke-width="1.5"/>

  <g transform="translate(140, 200)">
    <circle cx="22" cy="22" r="20" fill="#1a1826" stroke="#c9a96e" stroke-width="1.5"/>
    <text x="22" y="29" text-anchor="middle" font-size="20">🐚</text>
    <text x="58" y="20" font-size="16" fill="#ede8f5" font-weight="500">고동</text>
    <text x="58" y="40" font-size="11" fill="#9d9aad" letter-spacing="0.04em">소라고동</text>

    <g transform="translate(0, 70)">
      <rect x="500" y="0" width="420" height="46" rx="14" fill="#3a3550"/>
      <text x="520" y="29" font-size="16" fill="#ede8f5">오늘 또 회사 가기 싫어서 인스타 2시간 봤어 ㅠ</text>
    </g>

    <g transform="translate(0, 134)">
      <rect x="0" y="0" width="290" height="46" rx="14" fill="#1a1826" stroke="rgba(201,169,110,0.32)" stroke-width="1"/>
      <text x="20" y="29" font-size="16" fill="#ede8f5">이번 달에만 <tspan font-weight="700" fill="#e8c99a">14번째</tspan>야 ㅋㅋ</text>
    </g>

    <g transform="translate(0, 198)">
      <rect x="0" y="0" width="640" height="72" rx="14" fill="#1a1826" stroke="rgba(201,169,110,0.32)" stroke-width="1"/>
      <text x="20" y="29" font-size="16" fill="#ede8f5">근데 너 이러는 날, 거의 다 <tspan font-weight="700" fill="#e8c99a">밤 11시</tspan></text>
      <text x="20" y="55" font-size="16" fill="#ede8f5"><tspan font-weight="700" fill="#e8c99a">넘게까지</tspan> 일한 다음날이더라.</text>
    </g>

    <g transform="translate(0, 290)">
      <rect x="0" y="0" width="380" height="46" rx="14" fill="#1a1826" stroke="rgba(201,169,110,0.32)" stroke-width="1"/>
      <text x="20" y="29" font-size="16" fill="#ede8f5">너 게으른 거 아냐. 그냥 충전이 필요한 거.</text>
    </g>
  </g>

  <text x="600" y="585" text-anchor="middle" font-size="15" fill="#9d9aad" letter-spacing="0.04em">
    얘는 너를 이해해. <tspan fill="#c9a96e" font-weight="600">soragodong.com</tspan> 🐚
  </text>
</svg>
