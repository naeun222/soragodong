<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-content">
    <img class="login-icon" src="/godongicon.png" alt="소라고동" decoding="async">
    <div class="login-title">소라고동</div>
    <div class="login-sub"><span style="font-size:17px; color:var(--text); font-weight:500; letter-spacing:0.01em;">나를 아는 AI 길라잡이 <span class="accent">✦</span></span></div>

    <!-- 사용자 명시 2026-05-06: 모바일 브라우저 takeover 시 escape — iOS 인앱 / 빠른 로그인 사용자용. -->
    <!-- PWA 설치 카드 = 후속 (가입 완료 시점 노출 — 처음 진입자 강요 X). -->
    <a class="pwa-escape-link" onclick="escapePwaTakeover()">그냥 브라우저에서 로그인 →</a>

    <!-- Step 1: 게스트 / 로그인 선택 — 사용자 명시 2026-05-06 ultrathink. -->
    <div class="login-form" id="loginStep1">

      <!-- ── 1. Guest entry (top) — 사용자 명시 2026-05-06 ultrathink: subtle breathing + leaf sway + hover shimmer. ── -->
      <div class="login-guest-simple">
        <button id="guestEntryBtn" class="login-guest-btn-simple" onclick="enterGuestMode()">
          <span class="guest-btn-leaf" aria-hidden="true">🌱</span>
          <span class="guest-btn-text">그냥 해보기</span>
          <span class="guest-btn-arrow" aria-hidden="true">→</span>
        </button>
      </div>

      <!-- ── divider ── -->
      <div class="login-or-divider"><span>또는</span></div>

      <!-- ── 2. Login card (below) ── -->
      <div class="login-choice-card login-choice-primary">
        <div class="login-choice-title">🔒 같이 시작할까?</div>
        <div class="login-choice-sub">종단간 암호화로 안전하게 보관 · 모든 기기 동기화</div>

        <button type="button" class="sns-login-btn kakao" onclick="loginWithProvider('kakao')">
          <svg class="sns-login-icon" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true"><path d="M9 1.5C4.86 1.5 1.5 4.18 1.5 7.5c0 2.13 1.42 4 3.55 5.06l-.7 2.61c-.07.27.23.49.46.34l3.06-2.04c.38.04.76.07 1.13.07 4.14 0 7.5-2.68 7.5-6S13.14 1.5 9 1.5z"/></svg>
          <span>카카오로 시작하기</span>
        </button>

        <!-- 사용자 명시 2026-05-06: 이메일 OTP 로그인 완전 제거 — 카카오 + 게스트만. 함수 (handleSendCode/handleVerifyCode/resetLoginFlow) 는 다른 곳에서도 참조될 수 있어 코드는 유지. -->
      </div>

    </div>


    <!-- 사용자 보고 2026-05-05 (PortOne 심사): 약관/환불/개인정보 + 사업자 정보 footer 노출 (전상법 §13 의무 + PG 심사 요구). -->
    <div style="margin-top:32px; padding-top:18px; border-top:1px solid var(--border); font-size:11px; color:var(--text-soft); line-height:1.7; text-align:center;">
      <div style="margin-bottom:8px;">
        <a href="/terms" target="_blank" style="color:var(--text-dim);">이용약관</a> ·
        <a href="/refund" target="_blank" style="color:var(--text-dim);">환불정책</a> ·
        <a href="/privacy" target="_blank" style="color:var(--text-dim);">개인정보처리방침</a>
      </div>
      <div style="font-size:10.5px; line-height:1.7;">
        나은 랩(Lab) · 대표 김나은 · 사업자등록번호 261-21-02592<br>
        통신판매업 신고번호 2026-서울동작-0613<br>
        서울특별시 동작구 상도로47아길 14 · soragodongapp@gmail.com
      </div>
    </div>

  </div>
</div>
