<!-- 사용자 명시 2026-05-06 ultrathink (perf): boot splash inline style — head 도착 즉시 페인트되어야 perceived 로딩 단축. -->
<style>
  html, body { background: #0f0e17; margin: 0; }
  #bootSplash {
    position: fixed; inset: 0; z-index: 99999;
    background: #0f0e17;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 280ms ease-out;
    color: rgba(212,168,90,0.65);
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  }
  #bootSplash.fade-out { opacity: 0; pointer-events: none; }
  #bootSplash img { width: 56px; height: 56px; opacity: 0.92; animation: bootSplashPulse 1.4s ease-in-out infinite; }
  #bootSplash .boot-splash-text { font-size: 13px; margin-top: 14px; letter-spacing: 0.04em; }
  @keyframes bootSplashPulse {
    0%, 100% { transform: scale(1); opacity: 0.78; }
    50%      { transform: scale(1.06); opacity: 1; }
  }
</style>
