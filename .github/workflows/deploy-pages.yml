name: Deploy to GitHub Pages

on:
  push:
    branches: [main, v4-dev]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── V4 (v4-dev) ───
      - name: Setup Node
        if: github.ref == 'refs/heads/v4-dev'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install + build (V4)
        if: github.ref == 'refs/heads/v4-dev'
        run: |
          npm ci
          npm run build
          ls -la dist/

      - name: Deploy V4 (v4-dev → gh-pages /v4/)
        if: github.ref == 'refs/heads/v4-dev'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: v4
          keep_files: true
          commit_message: 'deploy: V4 preview from v4-dev (${{ github.sha }})'

      # ─── V3 (main) ───
      - name: Prepare V3 static
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p _publish
          cp index.html _publish/
          cp _headers _publish/ 2>/dev/null || true
          cp version.txt _publish/ 2>/dev/null || true
          cp icon-180.png icon-192.png icon-512.png icon-1024.png _publish/ 2>/dev/null || true
          ls -la _publish/

      - name: Deploy V3 (main → gh-pages root)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_publish
          destination_dir: .
          keep_files: true
          commit_message: 'deploy: V3 from main (${{ github.sha }})'
