name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-verify:
    name: Build & Verify (concat byte-identical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (concat — src/ → index.html + public/index.html)
        run: npm run build

      - name: Verify byte-identical (root vs public)
        run: npm run verify
